name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linux-release-check:
    name: Linux release checklist
    runs-on: ubuntu-latest
    steps:
      - name: Check out sitefetch
        uses: actions/checkout@v4
        with:
          path: sitefetch
      - name: Check out sitefetchlib sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/sitefetchlib
          path: sitefetchlib
      - name: Check out httpclient sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/httpclient
          path: httpclient
      - name: Check out regexp sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/regexp
          path: regexp
      - name: Check out zlib sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/zlib
          path: zlib
      - name: Check out cryptolib sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/cryptolib
          path: cryptolib
      - name: Check out i18n sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/i18n
          path: i18n
      - name: Check out terminal_styles sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/terminal_styles
          path: terminal_styles
      - name: Check out project_tools sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/project_tools
          path: project_tools
      - name: Set up Alire
        uses: alire-project/setup-alire@v5
        with:
          toolchain: gnat_native=15.2.1 gprbuild
      - name: Install GNATprove
        # The release checker runs "alr exec -- gnatprove". gnatprove is a regular Alire
        # crate, not a toolchain component, and apt has no reliable package.
        run: |
          alr install gnatprove
          echo "$HOME/.alire/bin" >> "$GITHUB_PATH"
      - name: Install OpenSSL headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev
      - name: Build sitefetch
        # Generates the gitignored Alire configs for the path-pinned siblings
        # (sitefetchlib, httpclient, zlib, cryptolib, regexp, i18n, terminal_styles);
        # gnatprove needs zlib's config/zlib_config.gpr.
        working-directory: sitefetch
        run: alr --non-interactive build
      - name: Run sitefetch release checker
        working-directory: sitefetch
        # gnatprove resolves httpclient.gpr's bare "with zlib" (and its cryptolib) through
        # GPR_PROJECT_PATH; alr exec does not add the path-pinned siblings itself.
        env:
          GPR_PROJECT_PATH: ${{ github.workspace }}/httpclient:${{ github.workspace }}/zlib:${{ github.workspace }}/cryptolib:${{ github.workspace }}/regexp
        run: ./bin/check_sitefetch
